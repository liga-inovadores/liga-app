<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarefas — Liga dos Inovadores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#ff7708;--orange-lt:#fff0e6;--orange-dk:#cc5f00;
  --bg:#f5f0eb;--white:#ffffff;--black:#1a1a1a;
  --gray-1:#f9f7f5;--gray-2:#ede9e3;--gray-3:#d1ccc4;--gray-4:#9b9189;--gray-5:#6b6059;
  --green:#16a34a;--green-lt:#dcfce7;
  --blue:#2563eb;--blue-lt:#dbeafe;
  --red:#dc2626;--red-lt:#fee2e2;
  --yellow:#d97706;--yell-lt:#fef3c7;
  --purple:#7c3aed;--purp-lt:#ede9fe;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
  --shadow-md:0 4px 20px rgba(0,0,0,.12);
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --indent:28px;
}
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--black);font-size:14px;line-height:1.5}

/* ── LAYOUT ─────────────────── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--gray-2);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--shadow)}
.topbar-logo{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--black)}
.topbar-logo span{color:var(--orange)}
.content{flex:1;overflow:hidden;display:flex;position:relative}
.main-panel{flex:1;overflow-y:auto;padding:24px}
.main-panel.panel-open{margin-right:380px}

/* ── FILTERS ────────────────── */
.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--white);border:1.5px solid var(--gray-3);border-radius:var(--radius-sm);padding:7px 12px;min-width:220px}
.search-box input{border:none;outline:none;font-family:var(--font-body);font-size:13px;background:transparent;width:100%}
.filter-select{padding:7px 12px;border:1.5px solid var(--gray-3);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;background:var(--white);cursor:pointer;outline:none;color:var(--black)}
.filter-select:focus{border-color:var(--orange)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:none;font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--orange);color:var(--white)}
.btn-primary:hover{background:var(--orange-dk)}
.btn-ghost{background:transparent;color:var(--gray-5);border:1.5px solid var(--gray-3)}
.btn-ghost:hover{background:var(--gray-1);color:var(--black)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{background:var(--red-lt);color:var(--red);border:none}
.btn-danger:hover{background:var(--red);color:var(--white)}
.filters-right{margin-left:auto;display:flex;gap:8px}

/* ── SECTION ────────────────── */
.section{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.section-header{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:background .15s}
.section-header:hover{background:var(--gray-1)}
.section-chevron{font-size:12px;transition:transform .2s;color:var(--gray-4)}
.section-chevron.open{transform:rotate(90deg)}
.section-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.section-name{font-weight:600;font-size:13px}
.section-count{font-size:11px;color:var(--gray-4);background:var(--gray-2);padding:1px 7px;border-radius:99px}
.section-body{display:none}
.section-body.open{display:block}

/* ── TASK ROW ───────────────── */
.task-row{display:flex;align-items:center;gap:0;padding:0;border-bottom:1px solid var(--gray-1);position:relative;min-height:40px;transition:background .1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:#faf9f7}
.task-row:hover .row-actions{opacity:1}
.task-row.level-1{padding-left:var(--indent)}
.task-row.level-2{padding-left:calc(var(--indent)*2)}
.task-row.done .task-name-input{text-decoration:line-through;color:var(--gray-4)}
.task-row.dragging{opacity:.4}
.task-row.drag-over{border-top:2px solid var(--orange)}

/* drag handle */
.drag-handle{padding:0 6px 0 10px;color:var(--gray-3);cursor:grab;font-size:16px;flex-shrink:0;opacity:0;transition:opacity .15s}
.task-row:hover .drag-handle{opacity:1}
.drag-handle:active{cursor:grabbing}

/* expand toggle */
.expand-btn{width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-4);font-size:10px;flex-shrink:0;border-radius:4px;margin-right:2px}
.expand-btn:hover{background:var(--gray-2)}
.expand-btn.hidden{visibility:hidden}

/* checkbox */
.task-check{width:18px;height:18px;border:1.5px solid var(--gray-3);border-radius:4px;cursor:pointer;flex-shrink:0;margin:0 8px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-check:hover{border-color:var(--orange)}
.task-check.checked{background:var(--green);border-color:var(--green);color:white}
.task-check.checked::after{content:'✓';font-size:11px;font-weight:700}

/* name */
.task-name-input{flex:1;border:none;outline:none;font-family:var(--font-body);font-size:13px;background:transparent;padding:10px 4px;color:var(--black);min-width:0}
.task-name-input::placeholder{color:var(--gray-3)}

/* inline fields */
.inline-field{border:none;outline:none;font-family:var(--font-body);font-size:12px;background:transparent;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background .1s;color:var(--gray-5);flex-shrink:0}
.inline-field:hover{background:var(--gray-1)}
.inline-field:focus{background:var(--gray-2)}
select.inline-field{appearance:none;-webkit-appearance:none;padding-right:4px}

/* action buttons */
.row-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s;padding:0 8px;flex-shrink:0}
.action-btn{width:26px;height:26px;border:none;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.action-btn:hover{transform:scale(1.15)}
.action-btn.sub{background:var(--purp-lt);color:var(--purple)}
.action-btn.notes{background:var(--blue-lt);color:var(--blue)}
.action-btn.pomo{background:var(--yell-lt);color:var(--yellow)}
.action-btn.time{background:var(--green-lt);color:var(--green)}
.action-btn.del{background:var(--red-lt);color:var(--red)}

/* badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-backlog{background:#f3f4f6;color:#6b7280}
.badge-fazendo{background:var(--blue-lt);color:var(--blue)}
.badge-revisao{background:var(--yell-lt);color:var(--yellow)}
.badge-concluido{background:var(--green-lt);color:var(--green)}
.badge-cancelado{background:var(--red-lt);color:var(--red)}
.prio-alta{color:var(--red);font-weight:700}
.prio-media{color:var(--yellow)}
.prio-baixa{color:var(--gray-4)}

/* add task row */
.add-task-row{padding:8px 16px 8px 44px;border-top:1px solid var(--gray-1)}
.add-task-input{width:100%;border:none;outline:none;font-family:var(--font-body);font-size:13px;background:transparent;color:var(--gray-5)}
.add-task-input::placeholder{color:var(--gray-3)}

/* no-category section */
.nocategory-list{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}

/* ── SLIDE PANEL ────────────── */
.slide-panel{position:absolute;top:0;right:-380px;width:380px;height:100%;background:var(--white);box-shadow:-4px 0 20px rgba(0,0,0,.1);transition:right .25s ease;display:flex;flex-direction:column;z-index:20;overflow:hidden}
.slide-panel.open{right:0}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--gray-2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-title{font-family:var(--font-display);font-size:16px;font-weight:500;color:var(--black)}
.panel-body{flex:1;overflow-y:auto;padding:16px 20px}
.panel-section{margin-bottom:20px}
.panel-section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gray-4);font-weight:600;margin-bottom:8px}
.notes-textarea{width:100%;border:1.5px solid var(--gray-2);border-radius:var(--radius-sm);padding:10px 12px;font-family:var(--font-body);font-size:13px;resize:vertical;min-height:100px;outline:none;color:var(--black)}
.notes-textarea:focus{border-color:var(--orange)}
.time-entry{display:flex;gap-8px;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--gray-1)}
.time-entry:last-child{border-bottom:none}
.time-icon{font-size:16px}
.time-info{flex:1;font-size:12px}
.time-date{color:var(--gray-4);font-size:11px}
.manual-time-form{display:flex;gap:6px;align-items:center;margin-top:8px}
.manual-time-form input{flex:1;padding:6px 10px;border:1.5px solid var(--gray-3);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:12px;outline:none}
.manual-time-form input:focus{border-color:var(--orange)}
.subtask-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray-1)}
.subtask-item:last-child{border-bottom:none}
.subtask-check{width:16px;height:16px;border:1.5px solid var(--gray-3);border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.subtask-check.checked{background:var(--green);border-color:var(--green);color:white;font-size:10px}
.subtask-name{font-size:13px;flex:1}
.subtask-name.done{text-decoration:line-through;color:var(--gray-4)}

/* ── POMODORO ───────────────── */
.pomo-float{position:fixed;bottom:24px;right:24px;width:280px;background:var(--white);border-radius:16px;box-shadow:var(--shadow-md);z-index:100;overflow:hidden;display:none}
.pomo-float.open{display:block}
.pomo-header{background:var(--black);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.pomo-title{color:var(--white);font-size:13px;font-weight:600}
.pomo-task-name{color:var(--gray-3);font-size:11px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pomo-body{padding:16px;text-align:center}
.pomo-timer{font-family:var(--font-display);font-size:48px;font-weight:700;color:var(--black);line-height:1}
.pomo-phase{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gray-4);margin-top:4px}
.pomo-rounds{display:flex;gap:4px;justify-content:center;margin:10px 0}
.pomo-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-2)}
.pomo-dot.done{background:var(--orange)}
.pomo-controls{display:flex;gap:8px;justify-content:center;margin-top:12px}
.pomo-select{width:100%;padding:6px 10px;border:1.5px solid var(--gray-2);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:12px;margin-bottom:10px;outline:none}
.pomo-select:focus{border-color:var(--orange)}

/* ── MODAL ──────────────────── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius);width:100%;max-width:440px;overflow:hidden;box-shadow:var(--shadow-md)}
.modal-header{padding:20px 24px 12px;font-family:var(--font-display);font-size:17px}
.modal-body{padding:0 24px 16px;font-size:13px;color:var(--gray-5);line-height:1.6}
.modal-footer{padding:12px 24px 20px;display:flex;gap:8px;justify-content:flex-end}

/* ── TRASH / EMPTY ──────────── */
.empty{text-align:center;padding:40px;color:var(--gray-4)}
.empty-icon{font-size:28px;margin-bottom:8px}
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{background:var(--black);color:var(--white);padding:10px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow-md);animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── TRASH VIEW ─────────────── */
.trash-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--white);border-radius:var(--radius-sm);margin-bottom:8px;box-shadow:var(--shadow)}
.trash-item-name{font-size:13px;font-weight:500}
.trash-item-date{font-size:11px;color:var(--gray-4);margin-top:2px}
.tab-bar{display:flex;gap:4px;margin-bottom:20px}
.tab{padding:7px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--gray-5);font-family:var(--font-body)}
.tab.active{background:var(--orange);color:var(--white)}
.tab:hover:not(.active){background:var(--gray-2)}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">Liga dos Inovadores <span>·</span> Tarefas</div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost btn-sm" onclick="toggleTrash()">🗑 Lixeira</button>
    <button class="btn btn-primary btn-sm" onclick="addTaskTop()">+ Nova Tarefa</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="main-panel" id="mainPanel">

    <!-- FILTERS -->
    <div class="filters">
      <div class="search-box">
        <span style="color:var(--gray-4)">⌕</span>
        <input type="text" placeholder="Buscar tarefas..." id="searchInput" oninput="applyFilters()">
      </div>
      <select class="filter-select" id="filterStatus" onchange="applyFilters()">
        <option value="">Todos os status</option>
        <option value="backlog">Backlog</option>
        <option value="fazendo">Em andamento</option>
        <option value="revisao">Em revisão</option>
        <option value="concluido">Concluído</option>
        <option value="cancelado">Cancelado</option>
      </select>
      <select class="filter-select" id="filterPrio" onchange="applyFilters()">
        <option value="">Todas as prioridades</option>
        <option value="alta">Alta</option>
        <option value="media">Média</option>
        <option value="baixa">Baixa</option>
      </select>
      <select class="filter-select" id="sortBy" onchange="applyFilters()">
        <option value="ordem">Ordem padrão</option>
        <option value="criado_em">Criação</option>
        <option value="prazo">Prazo</option>
        <option value="prioridade">Prioridade</option>
        <option value="status">Status</option>
      </select>
      <div class="filters-right">
        <button class="btn btn-ghost btn-sm" id="toggleDoneBtn" onclick="toggleShowDone()">👁 Ocultar concluídas</button>
      </div>
    </div>

    <!-- TASK LIST -->
    <div id="taskList"></div>

  </div><!-- /main-panel -->

  <!-- SLIDE PANEL -->
  <div class="slide-panel" id="slidePanel">
    <div class="panel-header">
      <span class="panel-title" id="panelTitle">Anotações</span>
      <button class="btn btn-ghost btn-sm" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div><!-- /content -->

</div><!-- /app -->

<!-- POMODORO FLOAT -->
<div class="pomo-float" id="pomoFloat">
  <div class="pomo-header">
    <div>
      <div class="pomo-title">🍅 Pomodoro</div>
      <div class="pomo-task-name" id="pomoTaskName">—</div>
    </div>
    <button class="btn btn-sm" style="background:#333;color:#fff;border:none;padding:4px 8px" onclick="closePomo()">✕</button>
  </div>
  <div class="pomo-body">
    <select class="pomo-select" id="pomoSelect" onchange="pomoSelectTask()"></select>
    <div class="pomo-timer" id="pomoTimer">25:00</div>
    <div class="pomo-phase" id="pomoPhase">FOCO</div>
    <div class="pomo-rounds" id="pomoRounds"></div>
    <div class="pomo-controls">
      <button class="btn btn-ghost btn-sm" onclick="pomoPause()" id="pomoPauseBtn">Pausar</button>
      <button class="btn btn-primary btn-sm" onclick="pomoStart()" id="pomoStartBtn">Iniciar</button>
      <button class="btn btn-ghost btn-sm" onclick="pomoReset()">⟳</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-header" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ══════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════
const SUPA_URL = 'https://chfvayznfflyfpbyivhe.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoZnZheXpuZmZseWZwYnlpdmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjEyOTksImV4cCI6MjA5MTI5NzI5OX0.FHto_CUCgJUF0ZMsXAq4dAu5seas2cJk2s2g0aTNRdI'
const sb = supabase.createClient(SUPA_URL, SUPA_KEY)

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let allTasks = []
let categories = []
let showDone = true
let openSections = {}
let dragSrcId = null
let activePanel = null
let pomoTaskId = null
let pomoInterval = null
let pomoSeconds = 25 * 60
let pomoRunning = false
let pomoPhase = 'focus'
let pomoRoundsCount = 0
let notesTimeout = {}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init() {
  const [{ data: cats }, { data: tasks }] = await Promise.all([
    sb.from('categorias').select('*').order('nome'),
    sb.from('tarefas').select('*').is('deleted_at', null).order('ordem').order('criado_em')
  ])
  categories = cats || []
  allTasks = tasks || []
  render()
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function applyFilters() { render() }

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase()
  const st = document.getElementById('filterStatus').value
  const pr = document.getElementById('filterPrio').value
  const so = document.getElementById('sortBy').value

  let tasks = allTasks.filter(t => !t.tarefa_principal_id) // top-level only

  if (!showDone) tasks = tasks.filter(t => t.status !== 'concluido')
  if (q) tasks = tasks.filter(t => t.nome.toLowerCase().includes(q))
  if (st) tasks = tasks.filter(t => t.status === st)
  if (pr) tasks = tasks.filter(t => t.prioridade === pr)

  const prioOrder = { alta: 0, media: 1, baixa: 2 }
  const stOrder = { fazendo: 0, revisao: 1, backlog: 2, concluido: 3, cancelado: 4 }

  if (so === 'criado_em') tasks.sort((a,b) => new Date(b.criado_em) - new Date(a.criado_em))
  else if (so === 'prazo') tasks.sort((a,b) => (a.prazo||'9999') < (b.prazo||'9999') ? -1 : 1)
  else if (so === 'prioridade') tasks.sort((a,b) => (prioOrder[a.prioridade]||1) - (prioOrder[b.prioridade]||1))
  else if (so === 'status') tasks.sort((a,b) => (stOrder[a.status]||2) - (stOrder[b.status]||2))
  else tasks.sort((a,b) => (a.ordem||0) - (b.ordem||0))

  return tasks
}

function render() {
  const tasks = getFiltered()
  const container = document.getElementById('taskList')

  // Group by category
  const byCat = {}
  const noCat = []
  tasks.forEach(t => {
    if (t.categoria_id) {
      if (!byCat[t.categoria_id]) byCat[t.categoria_id] = []
      byCat[t.categoria_id].push(t)
    } else {
      noCat.push(t)
    }
  })

  let html = ''

  // No-category tasks
  if (noCat.length > 0) {
    html += `<div class="nocategory-list">`
    noCat.forEach(t => { html += renderTaskRow(t, 0) })
    html += `<div class="add-task-row"><input class="add-task-input" placeholder="+ Adicionar tarefa..." onkeydown="if(event.key==='Enter')addTask(this.value,null,null,this)" ></div>`
    html += `</div>`
  }

  // By category
  categories.forEach(cat => {
    const catTasks = byCat[cat.id] || []
    if (catTasks.length === 0 && !openSections[cat.id]) return

    const isOpen = openSections[cat.id] !== false
    html += `<div class="section" id="sec-${cat.id}">`
    html += `<div class="section-header" onclick="toggleSection('${cat.id}')">
      <span class="section-chevron ${isOpen ? 'open' : ''}">▶</span>
      <span class="section-dot" style="background:${cat.cor}"></span>
      <span class="section-name">${cat.nome}</span>
      <span class="section-count">${catTasks.length}</span>
    </div>`
    html += `<div class="section-body ${isOpen ? 'open' : ''}" id="body-${cat.id}">`
    catTasks.forEach(t => { html += renderTaskRow(t, 0) })
    html += `<div class="add-task-row"><input class="add-task-input" placeholder="+ Adicionar tarefa nesta categoria..." onkeydown="if(event.key==='Enter')addTask(this.value,'${cat.id}',null,this)"></div>`
    html += `</div></div>`
  })

  // Button to add category
  html += `<div style="margin-top:8px;display:flex;gap:8px">
    <button class="btn btn-ghost btn-sm" onclick="modalAddCategory()">+ Nova categoria</button>
  </div>`

  container.innerHTML = html
  setupDragDrop()
}

function renderTaskRow(task, level) {
  const children = getChildren(task.id)
  const hasChildren = children.length > 0
  const isDone = task.status === 'concluido'
  const childrenHtml = hasChildren ? children.map(c => renderTaskRow(c, level + 1)).join('') : ''
  const isExpanded = openSections['t_'+task.id] !== false

  const prazoHtml = task.prazo
    ? `<input type="date" class="inline-field" value="${task.prazo}" onchange="updateTask('${task.id}','prazo',this.value)" style="font-size:11px;color:${isPastDue(task.prazo) ? 'var(--red)' : 'var(--gray-5)'}">`
    : `<input type="date" class="inline-field" placeholder="Prazo" onchange="updateTask('${task.id}','prazo',this.value)" style="font-size:11px;color:var(--gray-3);width:90px">`

  const catOptions = categories.map(c =>
    `<option value="${c.id}" ${task.categoria_id===c.id?'selected':''}>${c.nome}</option>`
  ).join('')

  return `
  <div class="task-row level-${level} ${isDone?'done':''}" id="row-${task.id}" 
       draggable="true" 
       data-id="${task.id}"
       ondragstart="dragStart(event,'${task.id}')"
       ondragover="dragOver(event)"
       ondrop="dragDrop(event,'${task.id}')"
       ondragleave="dragLeave(event)">
    <span class="drag-handle" title="Arrastar">⠿</span>
    <span class="expand-btn ${!hasChildren ? 'hidden' : ''}" onclick="toggleTaskExpand('${task.id}')">
      ${isExpanded ? '▾' : '▸'}
    </span>
    <div class="task-check ${isDone?'checked':''}" onclick="toggleDone('${task.id}','${task.status}')"></div>
    <input class="task-name-input" value="${escHtml(task.nome)}" 
           placeholder="Nome da tarefa..."
           onblur="updateTask('${task.id}','nome',this.value)"
           onkeydown="if(event.key==='Enter'){event.preventDefault();addTaskAfter('${task.id}')}">
    <select class="inline-field" onchange="updateTask('${task.id}','status',this.value)" style="min-width:80px">
      <option value="backlog" ${task.status==='backlog'?'selected':''}>Backlog</option>
      <option value="fazendo" ${task.status==='fazendo'?'selected':''}>Fazendo</option>
      <option value="revisao" ${task.status==='revisao'?'selected':''}>Revisão</option>
      <option value="concluido" ${task.status==='concluido'?'selected':''}>Concluído</option>
      <option value="cancelado" ${task.status==='cancelado'?'selected':''}>Cancelado</option>
    </select>
    <select class="inline-field" onchange="updateTask('${task.id}','prioridade',this.value)" style="font-size:11px">
      <option value="alta" ${task.prioridade==='alta'?'selected':''}>🔴 Alta</option>
      <option value="media" ${task.prioridade==='media'?'selected':''}>🟡 Média</option>
      <option value="baixa" ${task.prioridade==='baixa'?'selected':''}>🟢 Baixa</option>
    </select>
    ${prazoHtml}
    <select class="inline-field" onchange="updateTask('${task.id}','categoria_id',this.value||null)" style="font-size:11px;max-width:100px">
      <option value="">— sem cat.</option>
      ${catOptions}
    </select>
    <div class="row-actions">
      <button class="action-btn sub" title="Adicionar subtarefa" onclick="addSubtask('${task.id}')">⤵</button>
      <button class="action-btn notes" title="Anotações" onclick="openNotes('${task.id}','${escHtml(task.nome)}')">↗</button>
      <button class="action-btn pomo" title="Pomodoro" onclick="openPomo('${task.id}','${escHtml(task.nome)}')">⏱</button>
      <button class="action-btn time" title="Registrar tempo" onclick="openTimeModal('${task.id}','${escHtml(task.nome)}')">✏</button>
      <button class="action-btn del" title="Excluir" onclick="confirmDelete('${task.id}','${escHtml(task.nome)}')">✕</button>
    </div>
  </div>
  ${hasChildren && isExpanded ? childrenHtml : ''}
  `
}

function getChildren(parentId) {
  return allTasks
    .filter(t => t.tarefa_principal_id === parentId)
    .sort((a,b) => (a.ordem||0) - (b.ordem||0))
}

function toggleSection(catId) {
  openSections[catId] = openSections[catId] === false ? true : false
  render()
}

function toggleTaskExpand(taskId) {
  openSections['t_'+taskId] = openSections['t_'+taskId] === false ? true : false
  render()
}

// ══════════════════════════════════════════
// CRUD
// ══════════════════════════════════════════
async function addTask(nome, catId, parentId, inputEl) {
  if (!nome?.trim()) return
  const scrollY = document.getElementById('mainPanel').scrollTop
  const { data } = await sb.from('tarefas').insert({
    nome: nome.trim(),
    categoria_id: catId || null,
    tarefa_principal_id: parentId || null,
    status: 'backlog',
    prioridade: 'media',
    ordem: allTasks.length,
  }).select().single()
  if (data) {
    allTasks.push(data)
    if (inputEl) inputEl.value = ''
    render()
    document.getElementById('mainPanel').scrollTop = scrollY
  }
}

function addTaskTop() {
  const nome = prompt('Nome da nova tarefa:')
  if (nome?.trim()) addTask(nome, null, null, null)
}

async function addTaskAfter(taskId) {
  const task = allTasks.find(t => t.id === taskId)
  if (!task) return
  const input = document.querySelector(`#row-${taskId} .task-name-input`)
  const nome = prompt('Nome da nova tarefa:')
  if (nome?.trim()) addTask(nome, task.categoria_id, task.tarefa_principal_id, null)
}

async function addSubtask(parentId) {
  const nome = prompt('Nome da subtarefa:')
  if (nome?.trim()) {
    await addTask(nome, null, parentId, null)
    openSections['t_'+parentId] = true
  }
}

async function updateTask(id, field, value) {
  const task = allTasks.find(t => t.id === id)
  if (!task) return
  task[field] = value === '' ? null : value
  task.atualizado_em = new Date().toISOString()
  await sb.from('tarefas').update({ [field]: value || null, atualizado_em: task.atualizado_em }).eq('id', id)
  if (field === 'status') {
    const row = document.getElementById('row-' + id)
    if (row) {
      if (value === 'concluido') row.classList.add('done')
      else row.classList.remove('done')
    }
  }
  if (field === 'categoria_id') render()
}

async function toggleDone(id, currentStatus) {
  const newStatus = currentStatus === 'concluido' ? 'backlog' : 'concluido'
  await updateTask(id, 'status', newStatus)
  const check = document.querySelector(`#row-${id} .task-check`)
  const nameInput = document.querySelector(`#row-${id} .task-name-input`)
  if (check) {
    if (newStatus === 'concluido') { check.classList.add('checked'); check.setAttribute('onclick', `toggleDone('${id}','concluido')`) }
    else { check.classList.remove('checked'); check.setAttribute('onclick', `toggleDone('${id}','backlog')`) }
  }
  if (nameInput) {
    if (newStatus === 'concluido') nameInput.style.textDecoration = 'line-through'
    else nameInput.style.textDecoration = ''
  }
}

function confirmDelete(id, nome) {
  openModal(`Excluir "${nome}"?`,
    `<p>A tarefa será movida para a Lixeira e pode ser recuperada em até 30 dias.</p>
     <p style="margin-top:8px">Deseja manter o histórico de horas registradas?</p>`,
    `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-ghost btn-sm" onclick="deleteTask('${id}',false)">Excluir sem histórico</button>
     <button class="btn btn-danger btn-sm" onclick="deleteTask('${id}',true)">Excluir mantendo histórico</button>`
  )
}

async function deleteTask(id, keepHistory) {
  if (!keepHistory) {
    await sb.from('registros_tempo').delete().eq('tarefa_id', id)
  }
  const now = new Date().toISOString()
  await sb.from('tarefas').update({ deleted_at: now }).eq('id', id)
  allTasks = allTasks.filter(t => t.id !== id)
  closeModal()
  render()
  toast('Tarefa movida para a lixeira')
}

function toggleShowDone() {
  showDone = !showDone
  document.getElementById('toggleDoneBtn').textContent = showDone ? '👁 Ocultar concluídas' : '👁 Mostrar concluídas'

// ══════════════════════════════════════════
// DRAG & DROP
// ══════════════════════════════════════════
function setupDragDrop() {}
function dragStart(e, id) { dragSrcId = id; e.currentTarget.classList.add('dragging') }
function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over') }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over') }
async function dragDrop(e, targetId) {
  e.preventDefault()
  e.currentTarget.classList.remove('drag-over')
  document.querySelector(`#row-${dragSrcId}`)?.classList.remove('dragging')
  if (!dragSrcId || dragSrcId === targetId) return

  const srcTask = allTasks.find(t => t.id === dragSrcId)
  const tgtTask = allTasks.find(t => t.id === targetId)
  if (!srcTask || !tgtTask) return

  const tgtOrder = tgtTask.ordem || 0
  srcTask.ordem = tgtOrder - 0.5

  await sb.from('tarefas').update({ ordem: srcTask.ordem }).eq('id', dragSrcId)

  // Re-normalize orders
  const sameLevel = allTasks
    .filter(t => t.tarefa_principal_id === srcTask.tarefa_principal_id && t.categoria_id === srcTask.categoria_id)
    .sort((a,b) => (a.ordem||0) - (b.ordem||0))

  for (let i = 0; i < sameLevel.length; i++) {
    sameLevel[i].ordem = i
    await sb.from('tarefas').update({ ordem: i }).eq('id', sameLevel[i].id)
  }

  render()
  dragSrcId = null
}

// SLIDE PANEL — NOTES
// ══════════════════════════════════════════
async function openNotes(taskId, taskName) {
  activePanel = taskId
  document.getElementById('mainPanel').classList.add('panel-open')
  document.getElementById('slidePanel').classList.add('open')
  document.getElementById('panelTitle').textContent = taskName

  // Load data
  const [{ data: nota }, { data: subs }, { data: tempos }] = await Promise.all([
    sb.from('anotacoes').select('*').eq('tarefa_id', taskId).single(),
    sb.from('tarefas').select('*').eq('tarefa_principal_id', taskId).is('deleted_at', null),
    sb.from('registros_tempo').select('*').eq('tarefa_id', taskId).order('criado_em', { ascending: false }),
  ])

  const notaText = nota?.conteudo || ''
  const subsHtml = (subs||[]).map(s => `
    <div class="subtask-item">
      <div class="subtask-check ${s.status==='concluido'?'checked':''}" onclick="toggleDone('${s.id}','${s.status}')">
        ${s.status==='concluido'?'✓':''}
      </div>
      <span class="subtask-name ${s.status==='concluido'?'done':''}">${escHtml(s.nome)}</span>
    </div>`).join('') || '<p style="color:var(--gray-4);font-size:12px">Nenhuma subtarefa</p>'

  const totalMin = (tempos||[]).reduce((s,r) => s + (r.duracao_min||0), 0)
  const temposHtml = (tempos||[]).map(r => `
    <div class="time-entry">
      <span class="time-icon">${r.pomodoros > 0 ? '🍅' : '⏱'}</span>
      <div class="time-info">
        <div>${r.pomodoros > 0 ? `${r.pomodoros} pomodoros` : `${r.duracao_min} min`}</div>
        <div class="time-date">${new Date(r.criado_em).toLocaleString('pt-BR')}</div>
      </div>
    </div>`).join('') || '<p style="color:var(--gray-4);font-size:12px">Nenhum registro</p>'

  document.getElementById('panelBody').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Anotações</div>
      <textarea class="notes-textarea" id="notesArea" placeholder="Escreva aqui..." oninput="autoSaveNotes('${taskId}')">${escHtml(notaText)}</textarea>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Subtarefas</div>
      ${subsHtml}
      <div style="margin-top:8px">
        <input class="add-task-input" style="border:1px solid var(--gray-2);border-radius:6px;padding:6px 10px;width:100%" 
               placeholder="+ Nova subtarefa..." 
               onkeydown="if(event.key==='Enter'){addTask(this.value,null,'${taskId}',this);openNotes('${taskId}','${escHtml(taskName)}')}">
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Tempo registrado — total: ${formatMin(totalMin)}</div>
      ${temposHtml}
      <div class="manual-time-form" style="margin-top:12px">
        <input type="number" id="manualMin" placeholder="Min" min="1" style="width:70px">
        <input type="date" id="manualDate" value="${new Date().toISOString().split('T')[0]}">
        <button class="btn btn-primary btn-sm" onclick="saveManualTime('${taskId}')">Salvar</button>
      </div>
    </div>
  `
}

function closePanel() {
  activePanel = null
  document.getElementById('mainPanel').classList.remove('panel-open')
  document.getElementById('slidePanel').classList.remove('open')
}

function autoSaveNotes(taskId) {
  clearTimeout(notesTimeout[taskId])
  notesTimeout[taskId] = setTimeout(async () => {
    const text = document.getElementById('notesArea')?.value || ''
    await sb.from('anotacoes').upsert({ tarefa_id: taskId, conteudo: text, atualizado_em: new Date().toISOString() }, { onConflict: 'tarefa_id' })
  }, 800)
}

async function saveManualTime(taskId) {
  const min = parseInt(document.getElementById('manualMin')?.value)
  if (!min || min < 1) { toast('Informe os minutos', 'err'); return }
  const date = document.getElementById('manualDate')?.value
  await sb.from('registros_tempo').insert({
    tarefa_id: taskId,
    duracao_min: min,
    manual: true,
    criado_em: date ? new Date(date + 'T12:00:00').toISOString() : new Date().toISOString()
  })
  const task = allTasks.find(t => t.id === taskId)
  openNotes(taskId, task?.nome || '')
  toast(`${min} min registrados`)
}

function openTimeModal(taskId, taskName) {
  openModal(`Registrar tempo — ${taskName}`,
    `<div class="manual-time-form" style="flex-wrap:wrap">
      <input type="number" id="mtMin" placeholder="Minutos" min="1" style="flex:1;min-width:80px">
      <input type="date" id="mtDate" value="${new Date().toISOString().split('T')[0]}">
    </div>`,
    `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary btn-sm" onclick="saveTimeFromModal('${taskId}')">Salvar</button>`
  )
}

async function saveTimeFromModal(taskId) {
  const min = parseInt(document.getElementById('mtMin')?.value)
  if (!min || min < 1) { toast('Informe os minutos', 'err'); return }
  const date = document.getElementById('mtDate')?.value
  await sb.from('registros_tempo').insert({
    tarefa_id: taskId, duracao_min: min, manual: true,
    criado_em: date ? new Date(date + 'T12:00:00').toISOString() : new Date().toISOString()
  })
  closeModal()
  toast(`${min} min registrados`)
}

// POMODORO
// ══════════════════════════════════════════
function openPomo(taskId, taskName) {
  pomoTaskId = taskId
  document.getElementById('pomoTaskName').textContent = taskName
  document.getElementById('pomoFloat').classList.add('open')
  populatePomoSelect(taskId)
  renderPomoRounds()
}

function closePomo() {
  if (pomoRunning) pomoStop()
  document.getElementById('pomoFloat').classList.remove('open')
}

function pomoSelectTask() {
  const sel = document.getElementById('pomoSelect')
  if (!sel) return
  pomoTaskId = sel.value
  const task = allTasks.find(t => t.id === pomoTaskId)
  document.getElementById('pomoTaskName').textContent = task?.nome || '—'
}

function populatePomoSelect(selectedId) {
  const sel = document.getElementById('pomoSelect')
  sel.innerHTML = allTasks.filter(t => !t.tarefa_principal_id).map(t =>
    `<option value="${t.id}" ${t.id === selectedId ? 'selected' : ''}>${escHtml(t.nome)}</option>`
  ).join('')
}

function renderPomoRounds() {
  const rounds = document.getElementById('pomoRounds')
  rounds.innerHTML = Array.from({length: 4}, (_,i) =>
    `<div class="pomo-dot ${i < pomoRoundsCount ? 'done' : ''}"></div>`
  ).join('')
}

function pomoStart() {
  if (pomoRunning) return
  pomoRunning = true
  document.getElementById('pomoStartBtn').style.display = 'none'
  document.getElementById('pomoPauseBtn').style.display = 'block'
  pomoInterval = setInterval(pomoTick, 1000)
}

function pomoPause() {
  clearInterval(pomoInterval)
  pomoRunning = false
  document.getElementById('pomoStartBtn').style.display = 'block'
  document.getElementById('pomoPauseBtn').style.display = 'none'
}

function pomoReset() {
  pomoPause()
  pomoPhase = 'focus'
  pomoSeconds = 25 * 60
  document.getElementById('pomoTimer').textContent = '25:00'
  document.getElementById('pomoPhase').textContent = 'FOCO'
}

async function pomoTick() {
  pomoSeconds--
  const m = Math.floor(pomoSeconds / 60)
  const s = pomoSeconds % 60
  document.getElementById('pomoTimer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`

  if (pomoSeconds <= 0) {
    clearInterval(pomoInterval)
    pomoRunning = false

    if (pomoPhase === 'focus') {
      // Save pomodoro
      if (pomoTaskId) {
        await sb.from('registros_tempo').insert({
          tarefa_id: pomoTaskId, duracao_min: 25, manual: false, pomodoros: 1
        })
        toast('🍅 Pomodoro concluído!')
      }
      pomoRoundsCount = (pomoRoundsCount + 1) % 4
      renderPomoRounds()
      pomoPhase = 'break'
      pomoSeconds = pomoRoundsCount === 0 ? 15 * 60 : 5 * 60
      document.getElementById('pomoPhase').textContent = pomoRoundsCount === 0 ? 'PAUSA LONGA' : 'PAUSA'
    } else {
      pomoPhase = 'focus'
      pomoSeconds = 25 * 60
      document.getElementById('pomoPhase').textContent = 'FOCO'
    }

    const m2 = Math.floor(pomoSeconds / 60)
    document.getElementById('pomoTimer').textContent = `${String(m2).padStart(2,'0')}:00`
    document.getElementById('pomoStartBtn').style.display = 'block'
    document.getElementById('pomoPauseBtn').style.display = 'none'
  }
}

function pomoStop() { pomoPause() }

async function toggleTrash() {
  const { data: deleted } = await sb.from('tarefas').select('*').not('deleted_at', 'is', null).order('deleted_at', { ascending: false })

  if (!deleted?.length) { toast('Lixeira vazia'); return }

  const html = deleted.map(t => {
    const daysLeft = 30 - Math.floor((Date.now() - new Date(t.deleted_at)) / 86400000)
    return `<div class="trash-item">
      <div>
        <div class="trash-item-name">${escHtml(t.nome)}</div>
        <div class="trash-item-date">Expira em ${daysLeft} dia(s)</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="restoreTask('${t.id}')">Restaurar</button>
    </div>`
  }).join('')

  openModal('Lixeira', html, `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Fechar</button>`)
}

async function restoreTask(id) {
  await sb.from('tarefas').update({ deleted_at: null }).eq('id', id)
  const { data } = await sb.from('tarefas').select('*').eq('id', id).single()
  if (data) allTasks.push(data)
  closeModal()
  render()
  toast('Tarefa restaurada!')
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function isPastDue(d) { return d && new Date(d) < new Date(new Date().toDateString()) }
function formatMin(m) {
  if (!m) return '0 min'
  const h = Math.floor(m / 60), min = m % 60
  return h > 0 ? `${h}h ${min}min` : `${min}min`
}
function toast(msg, type) {
  const t = document.createElement('div')
  t.className = 'toast'
  t.textContent = msg
  if (type === 'err') t.style.background = 'var(--red)'
  document.getElementById('toastContainer').appendChild(t)
  setTimeout(() => t.remove(), 3000)
}
